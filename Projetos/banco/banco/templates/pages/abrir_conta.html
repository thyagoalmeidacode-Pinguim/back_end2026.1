{% extends 'base.html' %}

{% block content %}
<div class="form-box">
    <h2>Abrir Conta</h2>

    <!-- Metodo é a forma como o formulario envia os dados -->
    <!-- #GET - Os dados ficam visivei no endereço do navegador -->
    <!-- #POST - Não exibe os dados no navegador -->

    <form method="POST"> 
        {% csrf_token %} <!-- #Ele criptografa os dados enviados pelo formulario -->
        
        <div class="form-group">
            <label>Nome completo:</label>
            <input type="text" name="nome" required>
        </div>
        
        <div class="form-group">
            <label>CPF:</label>
            <input type="text" name="cpf" placeholder="000.000.000-00" required>
        </div>
        
        <button type="submit" class="btn btn-primary">Criar Conta</button>
    </form>
</div>

<p>Nome: {{nome}}</p>
<p>CPF: {{cpf}}</p>
{% endblock %}
