{% extends 'base.html' %}

{% block content %}

<section class="conta-box">

    <h2>Conta: {{ conta.numero }}</h2>
    <p>Cliente: {{ conta.cliente.nome }}</p>

    <div class="saldo">
        <strong>Saldo:  </strong>
        <span class="saldo-valor">R$  {{ conta.saldo|floatformat:2 }}</span>
    </div>
    
    <div class="botoes">
        <a href="" class="btn btn-success">Depositar</a>
        <a href="" class="btn btn-warning">Sacar</a>
    </div>

</section>
{% endblock %}
