{% extends "base.html" %}

{%  block content %}
<h1 class="titulo_clientes">{{ titulo }}</h1>
    <table>
        <thead>
            <tr>
                <th>Nome: </th>
                <th>CPF: </th>
                <th>Telefone: </th>
            </tr>
        </thead>
        <tbody>
            {% for cliente in dados_clientes %}
            <tr>
                <td>{{ cliente.nome }}</td>
                <td>{{ cliente.cpf }}</td>
                <td>{{ cliente.telefone }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
