<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h2>Login</h2>

{% for message in messages %}
<p>{{ message }}</p>
{% endfor %}

<form method="POST">

    {% csrf_token %}

    <label>Usuário</label><br>
    <input type="text" name="usuario"><br><br>

    <label>Senha</label><br>
    <input type="password" name="senha"><br><br>

    <button type="submit">Entrar </button>

</form>

</body>
</html>
